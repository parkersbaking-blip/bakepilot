<!-- Parker's Baking shield logo recreation -->
<!-- Replace with the real logo PNG: save as /public/parkersbaking-logo.png -->
<svg width="120" height="140" viewBox="0 0 120 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Crown -->
  <g fill="#C9A96E">
    <!-- Crown base -->
    <rect x="34" y="20" width="52" height="6" rx="2"/>
    <!-- Crown points -->
    <polygon points="60,4 56,20 64,20"/>
    <polygon points="44,8 40,20 50,20"/>
    <polygon points="76,8 80,20 70,20"/>
    <!-- Crown dots -->
    <circle cx="60" cy="3" r="2.5"/>
    <circle cx="44" cy="7" r="2"/>
    <circle cx="76" cy="7" r="2"/>
    <!-- Crown decorative lines -->
    <rect x="42" y="14" width="4" height="6" rx="1"/>
    <rect x="54" y="12" width="4" height="8" rx="1"/>
    <rect x="62" y="12" width="4" height="8" rx="1"/>
    <rect x="74" y="14" width="4" height="6" rx="1"/>
  </g>

  <!-- Shield body -->
  <path d="M18 28 L102 28 L102 88 Q102 110 60 128 Q18 110 18 88 Z" fill="#2A1F18"/>
  <!-- Shield gold border -->
  <path d="M18 28 L102 28 L102 88 Q102 110 60 128 Q18 110 18 88 Z" fill="none" stroke="#C9A96E" strokeWidth="3"/>

  <!-- Inner shield highlight -->
  <path d="M23 32 L97 32 L97 87 Q97 107 60 123 Q23 107 23 87 Z" fill="none" stroke="#C9A96E" strokeWidth="0.8" opacity="0.4"/>

  <!-- Letter P -->
  <text x="38" y="100" font-family="Georgia, serif" font-size="72" font-style="italic" font-weight="700" fill="white" opacity="0.95">P</text>

  <!-- Bottom ribbon -->
  <path d="M28 115 L92 115 L88 128 L60 133 L32 128 Z" fill="#C9A96E"/>
  <!-- Ribbon fold left -->
  <path d="M28 115 L22 128 L32 128 Z" fill="#A8884E"/>
  <!-- Ribbon fold right -->
  <path d="M92 115 L98 128 L88 128 Z" fill="#A8884E"/>
  <!-- Ribbon lines -->
  <path d="M36 120 L84 120" stroke="#A8884E" strokeWidth="1"/>
</svg>
